<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Checkout</title>

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<header class="navbar">

<div class="logo">
AL HUDA SAREES
</div>

</header>

<div class="page-spacer"></div>

<section class="checkout-page">

<h1>Checkout</h1>

<form id="checkoutForm">

<input
id="customerName"
type="text"
placeholder="Full Name"
required>

<input
id="customerPhone"
type="text"
placeholder="Phone Number"
required>

<input
id="customerAddress"
type="text"
placeholder="Address"
required>

<input
id="customerCity"
type="text"
placeholder="City"
required>

<input
id="customerState"
type="text"
placeholder="State"
required>

<input
id="customerPincode"
type="text"
placeholder="Pincode"
required>

<button type="submit">

Place Order

</button>

</form>

</section>
<script src="js/checkout.js"></script>
</body>

</html>
